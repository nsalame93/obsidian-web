<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 80" width="440" height="80">
  <rect width="440" height="80" fill="#090909"/>

  <!-- O como volante -->
  <!-- Aro exterior -->
  <circle cx="36" cy="40" r="28" fill="none" stroke="#f0ede8" stroke-width="1.4"/>
  <!-- Aro interior -->
  <circle cx="36" cy="40" r="18" fill="none" stroke="#f0ede8" stroke-width="0.7" opacity="0.35"/>
  <!-- Centro (buje) -->
  <circle cx="36" cy="40" r="3.5" fill="#f0ede8"/>
  <!-- Radios del volante: 3 radios a 0°, 120°, 240° -->
  <!-- Radio 0° (arriba) -->
  <line x1="36" y1="21.5" x2="36" y2="36.5" stroke="#f0ede8" stroke-width="1.1"/>
  <!-- Radio 120° (abajo derecha) -->
  <line x1="50.7" y1="48.7" x2="42.1" y2="43.7" stroke="#f0ede8" stroke-width="1.1"/>
  <!-- Radio 240° (abajo izquierda) -->
  <line x1="21.3" y1="48.7" x2="29.9" y2="43.7" stroke="#f0ede8" stroke-width="1.1"/>

  <!-- Texto BSIDIAN con Cinzel -->
  <text
    x="82"
    y="52"
    font-family="Cinzel, 'Times New Roman', serif"
    font-size="34"
    font-weight="400"
    letter-spacing="10"
    fill="#f0ede8"
  >BSIDIAN</text>
</svg>
